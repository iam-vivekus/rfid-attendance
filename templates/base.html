<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smart Attendance{% endblock %} | Smart Attendance System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/custom.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid px-4">
        <a class="navbar-brand" href="/">
            <i class="fas fa-id-card me-2"></i>Smart Attendance
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navLinks">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navLinks">
            <ul class="navbar-nav ms-2 gap-1">
                <li class="nav-item">
                    <a class="nav-link px-3 {% if request.url.path == '/' %}active fw-bold{% endif %}" href="/">
                        <i class="fas fa-gauge-high me-1"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link px-3 {% if '/students' in request.url.path %}active fw-bold{% endif %}" href="/students-page">
                        <i class="fas fa-users me-1"></i>Students
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link px-3 {% if '/attendance' in request.url.path %}active fw-bold{% endif %}" href="/attendance-page">
                        <i class="fas fa-clipboard-list me-1"></i>Attendance
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container-fluid px-4 py-4">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
