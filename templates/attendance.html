{% extends "base.html" %}
{% block title %}Attendance{% endblock %}

{% block content %}
<div class="row mb-4 align-items-center">
    <div class="col">
        <h4 class="section-title mb-0"><i class="fas fa-clipboard-list me-2 text-primary"></i>Attendance Records</h4>
    </div>
</div>

<!-- Live Feed -->
<div class="card mb-4">
    <div class="card-header d-flex justify-content-between align-items-center">
        <span><i class="fas fa-satellite-dish me-2 text-success"></i>Live Feed</span>
        <span id="ws-status" class="badge bg-success">Live</span>
    </div>
    <div class="card-body p-3" style="max-height: 220px; overflow-y: auto;">
        <div id="live-feed">
            <div class="feed-placeholder">
                <i class="fas fa-satellite-dish fa-2x mb-2 d-block opacity-25"></i>
                Waiting for attendance scans…
            </div>
        </div>
    </div>
</div>

<!-- History -->
<div class="card">
    <div class="card-header">
        <div class="row align-items-center g-2">
            <div class="col-auto">
                <i class="fas fa-calendar-days me-1 text-primary"></i>
                <strong>History</strong>
            </div>
            <div class="col-auto ms-auto d-flex gap-2 flex-wrap">
                <input type="date" class="form-control form-control-sm" id="dateInput" style="width: 160px;">
                <button class="btn btn-sm btn-primary" onclick="loadHistory()">
                    <i class="fas fa-magnifying-glass me-1"></i>Load
                </button>
                <button class="btn btn-sm btn-success" onclick="exportCSV()">
                    <i class="fas fa-file-csv me-1"></i>Export CSV
                </button>
            </div>
        </div>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th class="ps-4">#</th>
                        <th>Student Name</th>
                        <th>Class</th>
                        <th>Roll No.</th>
                        <th>Date &amp; Time</th>
                        <th>Type</th>
                    </tr>
                </thead>
                <tbody id="historyBody">
                    <tr>
                        <td colspan="6" class="text-center text-muted py-5">
                            Select a date and click <strong>Load</strong>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="px-4 py-2 text-muted small" id="recordCount"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
connectWebSocket();

// Set default date to today and auto-load
const todayStr = new Date().toISOString().split("T")[0];
document.getElementById("dateInput").value = todayStr;
loadHistory();

async function loadHistory() {
    const date = document.getElementById("dateInput").value;
    if (!date) return;

    const url = `/attendance/history?date=${date}`;
    const res = await fetch(url);
    if (!res.ok) { showToast("Failed to load records", "danger"); return; }
    const records = await res.json();
    renderTable(records, date);
}

function renderTable(records, date) {
    const tbody = document.getElementById("historyBody");
    const countEl = document.getElementById("recordCount");
    countEl.textContent = `${records.length} record(s) for ${date}`;

    if (!records.length) {
        tbody.innerHTML = `
            <tr><td colspan="6" class="text-center text-muted py-5">
                <i class="fas fa-inbox fa-2x mb-2 d-block opacity-25"></i>
                No attendance records for ${escHtml(date)}
            </td></tr>`;
        return;
    }

    tbody.innerHTML = records.map((r, i) => `
        <tr>
            <td class="ps-4 text-muted">${i + 1}</td>
            <td><strong>${escHtml(r.student_name)}</strong></td>
            <td>${escHtml(r.class_name)}</td>
            <td><code>${escHtml(r.roll_number)}</code></td>
            <td>${escHtml(r.timestamp)}</td>
            <td>
                <span class="badge ${r.attendance_type === "IN" ? "bg-success" : "bg-danger"}">
                    ${r.attendance_type}
                </span>
            </td>
        </tr>`).join("");
}

function exportCSV() {
    const date = document.getElementById("dateInput").value || todayStr;
    window.location.href = `/attendance/export?date=${date}`;
}
</script>
{% endblock %}
